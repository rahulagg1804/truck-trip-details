name: Deploy API to Hugging Face

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      HF_USERNAME: ${{ vars.HF_USERNAME || 'rahulagg1804' }}
      HF_SPACE: ${{ vars.HF_SPACE || 'truck-trip-planner-api' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install huggingface_hub
        run: pip install "huggingface_hub>=0.26"

      - name: Prepare Space files
        run: |
          mkdir -p hf-space/backend
          cp deploy/Dockerfile.hf hf-space/Dockerfile
          rsync -a \
            --exclude 'venv' \
            --exclude '.venv' \
            --exclude '__pycache__' \
            --exclude '*.pyc' \
            --exclude '.env' \
            backend/ hf-space/backend/
          cat > hf-space/README.md <<EOF
          ---
          title: Truck Trip Planner API
          sdk: docker
          app_port: 7860
          ---
          Django API for the Truck Trip Planner.
          EOF

      - name: Create or update Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "::error::Add repository secret HF_TOKEN"
            exit 1
          fi
          python <<'PY'
          import os
          from huggingface_hub import HfApi, upload_folder

          token = os.environ["HF_TOKEN"]
          user = os.environ["HF_USERNAME"]
          space = os.environ["HF_SPACE"]
          repo_id = f"{user}/{space}"
          api = HfApi(token=token)

          api.create_repo(
              repo_id,
              repo_type="space",
              space_sdk="docker",
              exist_ok=True,
          )

          upload_folder(
              folder_path="hf-space",
              repo_id=repo_id,
              repo_type="space",
              token=token,
              commit_message="Deploy API from GitHub Actions",
              ignore_patterns=["**/__pycache__/**", "**/*.pyc", "**/venv/**"],
          )
          print(f"Space: https://huggingface.co/spaces/{repo_id}")
          print(f"API URL: https://{user}-{space}.hf.space")
          PY
