name: Deploy API to PythonAnywhere

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via PythonAnywhere API
        env:
          PA_API_TOKEN: ${{ secrets.PA_API_TOKEN }}
          PA_USERNAME: rahulagg1804
        run: |
          if [ -z "$PA_API_TOKEN" ]; then
            echo "::error::Add repository secret PA_API_TOKEN (from pythonanywhere.com → Account → API Token)"
            exit 1
          fi
          chmod +x deploy/pa-remote-setup.sh
          ./deploy/pa-remote-setup.sh
