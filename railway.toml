# New Project → Deploy from GitHub → select this repo (uses this file automatically)

[build]
builder = "NIXPACKS"
buildCommand = "cd frontend && npm ci && npm run build && cd ../backend && pip install -r requirements.txt"

[deploy]
startCommand = "cd backend && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --timeout 120 --workers 1"
healthcheckPath = "/api/health/"
restartPolicyType = "ON_FAILURE"
