# Render Blueprint — https://dashboard.render.com/ → New → Blueprint
# Connect this repo; no credit card required for the free web service tier.

services:
  - type: web
    name: truck-trip-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --timeout 120 --workers 1
    healthCheckPath: /api/health/
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DEBUG
        value: "false"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: CORS_ALLOWED_ORIGINS
        value: https://rahulagg1804.github.io
      - key: GEOCODING_ENABLED
        value: "true"
