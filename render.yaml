services:
  - type: web
    name: truck-trip-api
    runtime: python
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    healthCheckPath: /api/health/
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: GEOCODING_ENABLED
        value: "true"
      - key: CORS_ALLOWED_ORIGINS
        value: https://truck-trip-web.onrender.com

  - type: web
    name: truck-trip-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://truck-trip-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
